services:
  spaghettnet:
    build:
      context: .
    container_name: spaghettnet
    restart: unless-stopped
    environment:
      Discord__Token: ${DISCORD_TOKEN}
      ConnectionStrings__Bot: "Data Source=/data/data.db"
      OpenAI__BaseUrl: ${OPENAI_BASE_URL}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL}
      OpenAI__SystemPrompt: ${OPENAI_SYSTEM_PROMPT}
      OpenAI__Temperature: ${OPENAI_TEMPERATURE}
      OpenAI__MaxTokens: ${OPENAI_MAX_TOKENS}
    volumes:
      - ./data:/data
