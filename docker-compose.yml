services:
  spaghettnet:
    build:
      context: .
    container_name: spaghettnet
    restart: unless-stopped
    environment:
      Discord__Token: ${DISCORD_TOKEN}
      ConnectionStrings__Bot: "Data Source=/data/data.db"
      OpenAI__BaseUrl: ${OPENAI_BASE_URL}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__ManagementApiKey: ${OPENROUTER_MANAGEMENT_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL}
      OpenAI__Temperature: ${OPENAI_TEMPERATURE}
      OpenAI__MaxTokens: ${OPENAI_MAX_TOKENS}
      OpenAI__ContextMessageCount: ${OPENAI_CONTEXT_MESSAGE_COUNT:-10}
      OpenAI__Tools__0__Type: ${OPENAI_TOOL_0_TYPE:-}
      OpenAI__Tools__1__Type: ${OPENAI_TOOL_1_TYPE:-}
    volumes:
      - ./data:/data
      - ./config:/app/config:ro
